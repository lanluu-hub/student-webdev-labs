<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Exercise 02 - Form</title>
  </head>
  <body>
    <main>
      <!-- Add your code here -->
      <h1>Roth IRA Calculator</h1>
      <form action="/submit" method="post">
        <label for="balance">Balance ($)<br /></label>
        <input type="text" name="balance" />
        <br />
        <br />
        <label for="contribution">Annual Contribution(4)<br /></label>
        <input type="text" id="contribution" name="contribution" />
        <br />
        <br />
        <label for="max-contribution">Maximum Contribution?<br /></label>
        <input
          type="radio"
          id="max-contribution"
          name="max-contribution"
          value="yes"
        />
        <label for="max-contribution">Yes</label>
        <input
          type="radio"
          id="max-contribution"
          name="max-contribution"
          value="no"
        />
        <label for="max-contribution">No</label>
        <br />
        <br />
        <label for="exp-rate-return">Expected Rate of Return(5)<br /></label>
        <input type="number" id="exp-rate-return" name="exp-rate-return" />
        <br />
        <br />
        <label for="cur-age">Current Age<br /></label>
        <input type="number" id="cur-age" name="cur-age" />
        <br />
        <br />
        <label for="ret-age">Retirement Age<br /></label>
        <input type="number" id="ret-age" name="ret-age" />
        <br />
        <br />
        <label for="mar-tax-rate">Marginal Tax Rate(%)<br /></label>
        <input type="number" id="mar-tax-rate" name="mar-tax-rate" />
        <br />
        <br />
        <button type="submit">Calculate</button>
        <button type="reset">Reset</button>
      </form>
      <br />
      <span
        >This exercise is a simplified version of a Roth IRA calculator at
        <a href="https://www.calculator.net/roth-ira-calculator.html"
          >Calculator.net</a
        >.</span
      >
    </main>
  </body>
</html>
