<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bootstrap Exercise 02 - Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="bg-light">
    <!-- <h1 class="text-center m-4 fs-2">Roth IRA Calculator</h1> -->
    <main class="d-flex justify-content-center align-items-center min-vh-100">
      <div class="shadow p-3 my-5 mx-3 bg-body rounded">
        <!-- Start with the code from the HTML folder.
      - Make sure to fix any issues in your HTML code.
      - Delete all mentions of <br>s and style the line breaks with CSS. 
      - Add classes to style the elements on the page. -->
        <header>
          <h1 class="text-center m-4 fs-2">Roth IRA Calculator</h1>
        </header>
        <form action="#" method="post">
          <div class="row g-2 align-items-center mb-3">
            <div class="col-lg-6">
              <label for="balance" class="col-form-label">Balance ($)</label>
            </div>
            <div class="col-lg-6">
              <input
                type="text"
                id="balance"
                name="balance"
                class="form-control"
              />
            </div>
          </div>
          <div class="row g-2 align-items-center mb-3">
            <div class="col-lg-6">
              <label for="contribution" class="col-form-label"
                >Annual Contribution ($)</label
              >
            </div>
            <div class="col-lg-6">
              <input
                type="text"
                id="contribution"
                name="contribution"
                class="form-control"
              />
            </div>
          </div>
          <fieldset class="row g-2 mb-3">
            <div class="col-lg-6">
              <legend class="fs-6">Maximize Contribution?</legend>
            </div>
            <div class="col-lg-6">
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  id="maxContribution1"
                  name="maxContribution"
                />
                <label for="maxContribution1" class="form-check-label"
                  >Yes</label
                >
              </div>
              <div class="form-check">
                <input
                  class="form-check-input"
                  type="radio"
                  id="maxContribution2"
                  name="maxContribution"
                />
                <label for="maxContribution2" class="form-check-label"
                  >No</label
                >
              </div>
            </div>
          </fieldset>
          <div class="row g-2 align-items-center mb-3">
            <div class="col-lg-6">
              <label for="expRateReturn" class="col-form-label"
                >Expected Rate of Return(%)</label
              >
            </div>
            <div class="col-lg-6">
              <input
                type="number"
                id="expRateReturn"
                name="expRateReturn"
                class="form-control"
              />
            </div>
          </div>
          <div class="row g-2 align-items-center mb-3">
            <div class="col-lg-6">
              <label for="currAge" class="col-form-label">Current Age</label>
            </div>
            <div class="col-lg-6">
              <input
                type="number"
                id="currAge"
                name="currAge"
                class="form-control"
              />
            </div>
          </div>
          <div class="row g-2 align-items-center mb-3">
            <div class="col-lg-6">
              <label for="retireAge" class="col-form-label"
                >Retirement Age</label
              >
            </div>
            <div class="col-lg-6">
              <input
                type="number"
                id="retireAge"
                name="retireAge"
                class="form-control"
              />
            </div>
          </div>
          <div class="row g-2 align-items-center mb-3">
            <div class="col-lg-6">
              <label for="marginTaxRate" class="col-form-label"
                >Marginal Tax Rate(%)</label
              >
            </div>
            <div class="col-lg-6">
              <input
                type="number"
                id="marginTaxRate"
                name="marginTaxRate"
                class="form-control"
              />
            </div>
          </div>
          <div class="d-flex justify-content-center gap-2">
            <button class="btn btn-primary col-6" type="submit">
              Calculate
            </button>
            <button class="btn btn-outline-secondary col-6" type="reset">
              Reset
            </button>
          </div>
        </form>
        <footer class="py-3">
          <span class="form-text"
            >This exercise is a simplified version of a Roth IRA calculator at
            <a href="https://www.calculator.net/roth-ira-calculator.html"
              >Calculator.net
            </a>
          </span>
        </footer>
      </div>
    </main>
  </body>
</html>
